<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo-gold.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vikings Billiards - Bàn bi-a Vikings chính hãng, chất lượng cao giá hợp lý. Các dòng Monster, Rise, Hunter Royal, Silver Hero, Hero. Tư vấn setup CLB trọn gói."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Vikings Billiards | Bàn Bi-A Cao Cấp Chính Hãng</title>
    <script>
      // Chống nhấp nháy: áp theme trước khi render (mặc định: tối)
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
